<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | Lumina Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#dae2fd",
                    "surface-container-low": "#f2f3ff",
                    "surface-container-high": "#e2e7ff",
                    "on-secondary-fixed-variant": "#444749",
                    "on-secondary-container": "#626567",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#00174b",
                    "on-background": "#131b2e",
                    "surface-variant": "#dae2fd",
                    "inverse-surface": "#283044",
                    "surface-dim": "#d2d9f4",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary-fixed": "#360f00",
                    "secondary-fixed": "#e0e3e5",
                    "primary-container": "#2563eb",
                    "inverse-on-surface": "#eef0ff",
                    "secondary-container": "#e0e3e5",
                    "primary": "#004ac6",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#434655",
                    "secondary-fixed-dim": "#c4c7c9",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#ffede6",
                    "background": "#faf8ff",
                    "tertiary-fixed": "#ffdbcd",
                    "primary-fixed": "#dbe1ff",
                    "surface": "#faf8ff",
                    "on-surface": "#131b2e",
                    "on-primary-container": "#eeefff",
                    "outline": "#737686",
                    "tertiary-fixed-dim": "#ffb596",
                    "tertiary-container": "#bc4800",
                    "outline-variant": "#c3c6d7",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary": "#943700",
                    "surface-bright": "#faf8ff",
                    "secondary": "#5c5f61",
                    "on-primary-fixed-variant": "#003ea8",
                    "error": "#ba1a1a",
                    "surface-container": "#eaedff",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-secondary-fixed": "#191c1e",
                    "surface-tint": "#0053db"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "xl": "32px",
                    "lg": "24px",
                    "sm": "8px",
                    "md": "16px",
                    "gutter": "16px",
                    "xs": "4px",
                    "sidebar_width": "280px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "message-text": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"],
                    "title-sm": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "message-text": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #E2E8F0;
        }

        .bg-subtle-wave {
            background-color: #faf8ff;
            background-image: radial-gradient(at 0% 0%, hsla(220,100%,95%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(210,100%,92%,1) 0, transparent 50%);
        }

        .input-focus-ring:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 1px #2563EB;
        }
    </style>
</head>
<body class="bg-subtle-wave font-body-md text-on-surface min-h-screen flex items-center justify-center p-md">
<!-- Login Container -->
<main class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Header (Subtle) -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-on-primary mb-md shadow-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Lumina Chat</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Administrator Portal</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<header class="mb-lg">
<h2 class="font-title-sm text-title-sm font-semibold text-on-surface mb-xs">Admin Login</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Secure access for local network management.</p>
</header>
<form action="#" class="space-y-md" method="POST" onsubmit="return false;">
<!-- Username/Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="admin-identifier">Username or Email</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">person</span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all duration-200" id="admin-identifier" name="identifier" placeholder="admin_id" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="admin-password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">lock</span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all duration-200" id="admin-password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-md">
<button class="w-full py-sm bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-title-sm text-title-sm rounded-lg shadow-sm transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-sm" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
</form>
<!-- Separation -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-container-lowest px-sm font-label-caps text-label-caps text-outline">or</span>
</div>
</div>
<!-- Secondary Action -->
<div class="flex justify-center">
<a class="flex items-center gap-xs font-body-sm text-body-sm text-secondary hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Return to LAN Chat
                </a>
</div>
</div>
<!-- Footer Info -->
<footer class="mt-xl text-center">
<p class="font-label-caps text-label-caps text-outline uppercase tracking-widest">
                Node status: <span class="text-primary font-bold">Secure Online</span>
</p>
<div class="mt-md flex justify-center gap-md opacity-40">
<span class="material-symbols-outlined text-[20px]">shield</span>
<span class="material-symbols-outlined text-[20px]">key</span>
<span class="material-symbols-outlined text-[20px]">lan</span>
</div>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-fixed opacity-20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[350px] h-[350px] bg-tertiary-fixed opacity-30 rounded-full blur-[80px]"></div>
</div>
<script>
        // Simple Interaction logic for button pressing feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('brightness-90'));
            btn.addEventListener('mouseup', () => btn.classList.remove('brightness-90'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('brightness-90'));
        });

        // Focus animation logic for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#004ac6';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#737686';
            });
        });
    </script>
</body></html>
