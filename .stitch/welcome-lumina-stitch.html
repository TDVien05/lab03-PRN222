<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "secondary-container": "#e0e3e5",

                    "surface-dim": "#d2d9f4",
                    "surface": "#faf8ff",
                    "secondary-fixed-dim": "#c4c7c9",
                    "on-surface": "#131b2e",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#434655",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#b4c5ff",
                    "background": "#faf8ff",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#00174b",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#dae2fd",
                    "outline-variant": "#c3c6d7",
                    "surface-bright": "#faf8ff",
                    "primary-container": "#2563eb",
                    "on-tertiary-fixed-variant": "#7d2d00",

                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#ffede6",
                    "on-secondary-fixed": "#191c1e",

                    "error-container": "#ffdad6",
                    "inverse-primary": "#b4c5ff",
                    "tertiary-fixed-dim": "#ffb596",
                    "surface-container": "#eaedff",
                    "primary-fixed": "#dbe1ff",
                    "inverse-surface": "#283044",
                    "surface-container-low": "#f2f3ff",
                    "secondary": "#5c5f61",

<style>
        body {
            background-color: #f2f3ff; /* surface-container-low */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #E2E8F0;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .noise-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-md">
<div class="noise-texture"></div>
<main class="relative z-10 w-full max-w-[480px]">
<!-- Brand Identity Container -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary mb-md shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]">
                    hub
                </span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-xs">
                Lumina Chat
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto opacity-80">
                A secure, distraction-free messaging platform hosted on your local network.
            </p>
</div>
<!-- Main Interaction Card -->
<div class="glass-card rounded-xl p-xl flex flex-col gap-lg">
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1" for="display-name">
                    DISPLAY NAME
                </label>
<div class="relative">
<input class="w-full h-14 px-md bg-white border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary transition-all duration-200" id="display-name" placeholder="How should others see you?" type="text"/>
<div class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</div>
<div class="space-y-md">
<button class="group relative w-full h-14 bg-primary text-on-primary rounded-lg font-title-sm text-title-sm flex items-center justify-center gap-sm overflow-hidden transition-transform active:scale-[0.98] hover:bg-primary-container" onclick="handleEnterChat()">
<span>Enter Chat</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">
                        arrow_forward
                    </span>
</button>
<div class="flex items-center justify-center gap-xs text-on-surface-variant/60 font-body-sm text-body-sm">
<span class="material-symbols-outlined text-[18px]">lan</span>
<span>Connected to Local Network</span>
</div>
</div>
</div>
<!-- Footer / Meta -->
<footer class="mt-xl flex justify-center gap-lg">
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">HELP</a>
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">ABOUT</a>
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">PRIVACY</a>
</footer>
</main>
<!-- Background Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-surface-tint/10 rounded-full blur-[100px]"></div>
<script>
        function handleEnterChat() {
            const input = document.getElementById('display-name');
            const name = input.value.trim();
            
            if (name === "") {
                input.classList.add('border-error');
                input.placeholder = "Please enter a name first";
                setTimeout(() => {
                    input.classList.remove('border-error');
                }, 2000);
                return;
            }

            // Simple visual feedback before navigation
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Connecting...`;
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                // In a real app, we'd navigate to the dashboard/chat
                console.log(`Entering Lumina Chat as ${name}`);
                // Restore button for demo purposes
                btn.innerHTML = originalText;
                btn.style.pointerEvents = 'auto';
            }, 1500);
        }

        // Allow Enter key to trigger join
        document.getElementById('display-name').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleEnterChat();
            }
        });
    </script>
</body></html>
